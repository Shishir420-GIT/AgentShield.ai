version: '3.8'

services:
  agentshield:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentshield:latest
    container_name: agentshield
    ports:
      - "8000:8000"
    environment:
      # Backend API key (set your OpenAI/Claude key)
      - AGENTSHIELD_BACKEND_API_KEY=${AGENTSHIELD_BACKEND_API_KEY}

      # Gateway configuration
      - AGENTSHIELD_PORT=8000
      - AGENTSHIELD_HOST=0.0.0.0

      # Optional: Tenant configuration
      - AGENTSHIELD_DEFAULT_TENANT=${AGENTSHIELD_DEFAULT_TENANT:-default}

      # Optional: Backend URL (defaults to OpenAI)
      - AGENTSHIELD_BACKEND_URL=${AGENTSHIELD_BACKEND_URL:-https://api.openai.com/v1}

      # Optional: Log level
      - AGENTSHIELD_LOG_LEVEL=${AGENTSHIELD_LOG_LEVEL:-INFO}

    volumes:
      # Optional: Mount audit logs directory
      - ./audit_logs:/app/audit_logs

      # Optional: Mount custom policies
      - ./policies:/app/policies

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - agentshield-network

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: agentshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - agentshield-network
    profiles:
      - monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: agentshield-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - agentshield-network
    profiles:
      - monitoring

networks:
  agentshield-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
